<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учёт одежды</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.25);
    --text: #1a1a1a;
    --text-muted: #666;
    --accent: #3a5fd4;
    --accent-bg: #eef1fb;
    --danger: #c0392b;
    --danger-bg: #fdf0ef;
    --success: #1a7a4a;
    --success-bg: #eaf4ee;
    --warn-bg: #fef9e7;
    --warn: #9a6f00;
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #252525;
      --border: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.25);
      --text: #f0eeea;
      --text-muted: #999;
      --accent: #7a9bff;
      --accent-bg: #1e2a4a;
      --danger: #e57373;
      --danger-bg: #3a1a1a;
      --success: #5dbf82;
      --success-bg: #1a3a2a;
      --warn-bg: #2a2410;
      --warn: #f0c040;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; gap: 10px; }
  header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  header .tabs { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  header .tabs::-webkit-scrollbar { display: none; }
  .tab-btn { padding: 6px 11px; border: 0.5px solid var(--border); background: transparent; border-radius: 8px; cursor: pointer; font-size: 12px; color: var(--text-muted); transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  main { max-width: 1100px; margin: 0 auto; padding: 16px; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .stat-value { font-size: 20px; font-weight: 600; }

  .btn { padding: 8px 14px; border-radius: 8px; border: 0.5px solid var(--border-strong); cursor: pointer; font-size: 13px; font-weight: 500; background: var(--surface); color: var(--text); transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .btn:active { opacity: 0.75; transform: scale(0.97); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.danger { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
  .btn.sm { padding: 6px 10px; font-size: 12px; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 140px; padding: 8px 12px; border: 0.5px solid var(--border-strong); border-radius: 8px; font-size: 14px; background: var(--surface); color: var(--text); }
  .search-box:focus { outline: none; border-color: var(--accent); }
  select.filter { padding: 8px 10px; border: 0.5px solid var(--border-strong); border-radius: 8px; font-size: 13px; background: var(--surface); color: var(--text); cursor: pointer; }

  /* Desktop table */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius); border: 0.5px solid var(--border); }
  table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 14px; min-width: 580px; }
  thead { border-bottom: 0.5px solid var(--border); }
  th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--text); }
  td { padding: 10px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }

  /* Mobile cards */
  .item-cards { display: none; flex-direction: column; gap: 10px; }
  .item-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; gap: 12px; }
  .item-card-img { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 0.5px solid var(--border); flex-shrink: 0; cursor: zoom-in; }
  .item-card-no-img { width: 64px; height: 64px; border-radius: 8px; border: 0.5px dashed var(--border-strong); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 10px; background: var(--bg); flex-shrink: 0; text-align: center; }
  .item-card-body { flex: 1; min-width: 0; }
  .item-card-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .item-card-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .item-card-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 4px; }
  .item-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; border: 0.5px solid var(--border); background: var(--bg); }
  .no-img { width: 44px; height: 44px; border-radius: 6px; border: 0.5px dashed var(--border-strong); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 10px; background: var(--bg); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.ok { background: var(--success-bg); color: var(--success); }
  .badge.low { background: var(--warn-bg); color: var(--warn); }
  .badge.zero { background: var(--danger-bg); color: var(--danger); }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .sort-arrow { margin-left: 4px; opacity: 0.5; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: var(--surface); border-radius: 18px 18px 0 0; border: 0.5px solid var(--border); width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; padding: 20px 16px; }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  input[type=text], input[type=number], input[type=file], select, textarea {
    padding: 10px; border: 0.5px solid var(--border-strong); border-radius: 8px;
    font-size: 16px; background: var(--surface); color: var(--text); width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  input[type=file] { padding: 6px; cursor: pointer; font-size: 14px; }
  .img-preview { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; border: 0.5px solid var(--border); margin-top: 6px; }
  .modal-footer { display: flex; gap: 10px; margin-top: 16px; }
  .modal-footer .btn { flex: 1; text-align: center; padding: 12px; font-size: 15px; }

  .sale-modal .sale-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .sale-modal .sale-item:last-child { border-bottom: none; }
  .sale-item img, .sale-item .no-img { width: 40px; height: 40px; }
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
  .history-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  #cart-panel { border-radius: 14px 14px 0 0 !important; }

  .empty { text-align: center; padding: 48px 16px; color: var(--text-muted); }
  .empty svg { margin-bottom: 12px; opacity: 0.3; }
  .tag-input { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px; border: 0.5px solid var(--border-strong); border-radius: 8px; min-height: 38px; cursor: text; background: var(--surface); }
  .tag { background: var(--accent-bg); color: var(--accent); padding: 2px 8px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
  .tag .rm { cursor: pointer; font-size: 14px; line-height: 1; }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .form-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    main { padding: 10px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-value { font-size: 17px; }
    .form-grid { grid-template-columns: 1fr; }
    .toolbar { gap: 6px; }
    .search-box { min-width: 100%; order: -1; }
    .table-wrap { display: none; }
    .item-cards { display: flex; }
    .history-item { flex-direction: column; align-items: flex-start; gap: 8px; }
    #cart-panel { left: 0 !important; right: 0 !important; width: 100% !important; max-width: 100% !important; }
    .rep-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<header>
  <h1>👗 Склад одежды</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('inventory')">Остатки</button>
    <button class="tab-btn" onclick="showTab('reserves')">Брони <span id="reserve-badge" style="display:none;background:#e74c3c;color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px"></span></button>
    <button class="tab-btn" onclick="showTab('history')">Продажи</button>
    <button class="tab-btn" onclick="showTab('report')">📊 Отчёт</button>
  </div>
</header>
<main>
  <div id="tab-inventory">
    <div class="stats-row" id="stats-row"></div>
    <div class="toolbar">
      <input class="search-box" type="text" placeholder="Поиск по артикулу, названию, категории…" id="search-input" oninput="renderTable()">
      <select class="filter" id="cat-filter" onchange="renderTable()"><option value="">Все категории</option></select>
      <select class="filter" id="stock-filter" onchange="renderTable()">
        <option value="">Все</option>
        <option value="ok">В наличии</option>
        <option value="low">Мало</option>
        <option value="zero">Нет</option>
      </select>
      <button class="btn primary" onclick="openAddModal()">+ Добавить товар</button>
      <button class="btn" onclick="seedManual()" id="seed-btn" style="display:none">📦 Загрузить примеры</button>
    </div>
    <div class="table-wrap">
      <table id="main-table">
        <thead>
          <tr>
            <th></th>
            <th onclick="setSort('sku')">Артикул <span class="sort-arrow" id="sort-sku"></span></th>
            <th onclick="setSort('name')">Название <span class="sort-arrow" id="sort-name"></span></th>
            <th onclick="setSort('category')">Категория <span class="sort-arrow" id="sort-category"></span></th>
            <th onclick="setSort('price')">Цена <span class="sort-arrow" id="sort-price"></span></th>
            <th onclick="setSort('qty')">Остаток <span class="sort-arrow" id="sort-qty"></span></th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <div class="item-cards" id="item-cards"></div>
    <div id="empty-state" class="empty" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
      <p>Товаров нет. Добавьте первый товар.</p>
    </div>
  </div>
  <div id="tab-reserves" style="display:none">
    <div class="toolbar">
      <input class="search-box" type="text" placeholder="Поиск по клиенту, товару…" id="res-search" oninput="renderReserves()">
    </div>
    <div class="history-list" id="reserves-list"></div>
    <div id="res-empty" class="empty" style="display:none"><p>Активных броней нет.</p></div>
  </div>
  <div id="tab-report" style="display:none">
    <div class="toolbar" style="flex-wrap:wrap;gap:10px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <label style="font-size:13px;color:var(--text-muted)">С:</label>
        <input type="date" id="rep-from" class="filter" style="padding:7px 10px">
        <label style="font-size:13px;color:var(--text-muted)">По:</label>
        <input type="date" id="rep-to" class="filter" style="padding:7px 10px">
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn sm" onclick="setRepPeriod('week')">Неделя</button>
        <button class="btn sm" onclick="setRepPeriod('month')">Месяц</button>
        <button class="btn sm" onclick="setRepPeriod('quarter')">Квартал</button>
        <button class="btn sm" onclick="setRepPeriod('year')">Год</button>
        <button class="btn sm" onclick="setRepPeriod('all')">Всё время</button>
      </div>
      <button class="btn primary sm" onclick="renderReport()" style="margin-left:auto">Сформировать</button>
    </div>
    <div id="report-content"></div>
  </div>
  <div id="tab-history" style="display:none">
    <div class="toolbar">
      <input class="search-box" type="text" placeholder="Поиск в продажах…" id="hist-search" oninput="renderHistory()">
      <button class="btn danger sm" onclick="clearHistory()" style="margin-left:auto">Очистить историю</button>
    </div>
    <div class="history-list" id="history-list"></div>
    <div id="hist-empty" class="empty" style="display:none">
      <p>Продаж пока нет.</p>
    </div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Добавить товар</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Артикул *</label>
        <input type="text" id="f-sku" placeholder="Напр. HOM-001">
      </div>
      <div class="form-group">
        <label>Название *</label>
        <input type="text" id="f-name" placeholder="Напр. Пижама в полоску">
      </div>
      <div class="form-group">
        <label>Категория</label>
        <input type="text" id="f-category" placeholder="Напр. Пижамы, Халаты…" list="cat-list">
        <datalist id="cat-list"></datalist>
      </div>
      <div class="form-group">
        <label>Размер / вариант</label>
        <input type="text" id="f-size" placeholder="S, M, L, XL или свободно">
      </div>
      <div class="form-group">
        <label>Цена продажи (₽) *</label>
        <input type="number" id="f-price" placeholder="0" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Себестоимость (₽)</label>
        <input type="number" id="f-cost" placeholder="0" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Количество *</label>
        <input type="number" id="f-qty" placeholder="0" min="0" step="1">
      </div>
      <div class="form-group">
        <label>Мин. остаток (предупреждение)</label>
        <input type="number" id="f-min-qty" placeholder="3" min="0" step="1">
      </div>
      <div class="form-group full">
        <label>Описание / заметка</label>
        <textarea id="f-desc" rows="2" placeholder="Любые заметки…"></textarea>
      </div>
      <div class="form-group full">
        <label>Фото товара</label>
        <input type="file" id="f-photo" accept="image/*" onchange="previewPhoto(this)">
        <img id="f-photo-preview" class="img-preview" style="display:none">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn primary" onclick="saveItem()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Image Lightbox -->
<div id="lightbox" onclick="closeLightbox()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center;cursor:zoom-out;">
  <img id="lightbox-img" style="max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain;">
</div>

<!-- Cart Panel -->
<div id="cart-panel" style="display:none;position:fixed;bottom:0;right:0;width:340px;max-height:80vh;background:var(--surface);border:0.5px solid var(--border);border-radius:14px 0 0 0;box-shadow:0 -2px 24px rgba(0,0,0,0.12);z-index:150;display:none;flex-direction:column;">
  <div style="padding:14px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
    <strong style="font-size:15px">🛒 Корзина</strong>
    <button class="btn sm" onclick="clearCart()">Очистить</button>
  </div>
  <div id="cart-items" style="overflow-y:auto;flex:1;padding:8px 0;"></div>
  <div style="padding:12px 16px;border-top:0.5px solid var(--border);">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px;">
      <span style="color:var(--text-muted)">Итого:</span>
      <strong id="cart-total" style="font-size:16px"></strong>
    </div>
    <input type="text" id="cart-note" placeholder="Покупатель / комментарий" style="margin-bottom:8px;font-size:13px;">
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="createReserve()">📌 Забронировать</button>
      <button class="btn primary" style="flex:1" onclick="confirmOrder()">✅ Продать</button>
    </div>
  </div>
</div>

<script>
let db;
let items = [];
let sales = [];
let reserves = [];
let editingId = null;
let cart = [];
let sortField = 'name';
let sortAsc = true;
let photoDataUrl = null;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('ClothingInventory', 3);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('items')) {
        const s = d.createObjectStore('items', { keyPath: 'id', autoIncrement: true });
        s.createIndex('sku', 'sku', { unique: false });
      }
      if (!d.objectStoreNames.contains('sales')) {
        d.createObjectStore('sales', { keyPath: 'id', autoIncrement: true });
      }
      if (!d.objectStoreNames.contains('reserves')) {
        d.createObjectStore('reserves', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = e => rej(e);
  });
}

function txGet(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
    tx.onerror = e => rej(e.target.error);
  });
}
function txPut(store, obj) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(obj);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
    tx.onerror = e => rej(e.target.error);
  });
}
function txDelete(store, id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
    tx.onerror = e => rej(e.target.error);
  });
}
function txAdd(store, obj) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).add(obj);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
    tx.onerror = e => rej(e.target.error);
  });
}
function txClear(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).clear();
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
    tx.onerror = e => rej(e.target.error);
  });
}

async function loadAll() {
  items = await txGet('items');
  sales = await txGet('sales');
  reserves = await txGet('reserves');
}

function showTab(t) {
  ['inventory','reserves','history','report'].forEach(id => {
    document.getElementById('tab-'+id).style.display = t === id ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['inventory','reserves','history','report'][i] === t);
  });
  if (t === 'history') renderHistory();
  if (t === 'reserves') renderReserves();
  if (t === 'report') { initReportDates(); renderReport(); }
}

function initReportDates() {
  if (document.getElementById('rep-from').value) return;
  const now = new Date();
  const from = new Date(now.getFullYear(), now.getMonth(), 1);
  document.getElementById('rep-from').value = from.toISOString().slice(0,10);
  document.getElementById('rep-to').value = now.toISOString().slice(0,10);
}

function setRepPeriod(p) {
  const now = new Date();
  let from;
  if (p === 'week') from = new Date(now - 7*86400000);
  else if (p === 'month') from = new Date(now.getFullYear(), now.getMonth(), 1);
  else if (p === 'quarter') from = new Date(now.getFullYear(), Math.floor(now.getMonth()/3)*3, 1);
  else if (p === 'year') from = new Date(now.getFullYear(), 0, 1);
  else from = new Date(0);
  document.getElementById('rep-from').value = from.toISOString().slice(0,10);
  document.getElementById('rep-to').value = now.toISOString().slice(0,10);
  renderReport();
}

function renderReport() {
  const fromVal = document.getElementById('rep-from').value;
  const toVal = document.getElementById('rep-to').value;
  const fromTs = fromVal ? new Date(fromVal).getTime() : 0;
  const toTs = toVal ? new Date(toVal + 'T23:59:59').getTime() : Date.now();

  const periodSales = sales.filter(s => s.soldAt >= fromTs && s.soldAt <= toTs);

  const revenue = periodSales.reduce((s, l) => s + (l.total || 0), 0);
  const units = periodSales.reduce((s, l) => s + (l.qty || 0), 0);
  const orderIds = new Set(periodSales.map(l => l.orderId || l.id));
  const orderCount = orderIds.size;
  const avgOrder = orderCount ? revenue / orderCount : 0;

  const profit = periodSales.reduce((s, l) => {
    const it = items.find(i => i.id === l.itemId);
    const cost = it ? (it.cost || 0) : 0;
    return s + (l.price - cost) * l.qty;
  }, 0);

  const topMap = {};
  for (const l of periodSales) {
    const key = l.itemId;
    if (!topMap[key]) topMap[key] = { name: l.itemName, sku: l.itemSku, units: 0, revenue: 0 };
    topMap[key].units += l.qty;
    topMap[key].revenue += l.total || 0;
  }
  const top = Object.values(topMap).sort((a,b) => b.revenue - a.revenue).slice(0,5);

  const catMap = {};
  for (const l of periodSales) {
    const it = items.find(i => i.id === l.itemId);
    const cat = it ? (it.category || 'Без категории') : 'Неизвестно';
    if (!catMap[cat]) catMap[cat] = { units: 0, revenue: 0 };
    catMap[cat].units += l.qty;
    catMap[cat].revenue += l.total || 0;
  }
  const cats = Object.entries(catMap).sort((a,b) => b[1].revenue - a[1].revenue);

  const byDay = {};
  for (const l of periodSales) {
    const day = new Date(l.soldAt).toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
    if (!byDay[day]) byDay[day] = { ts: l.soldAt, revenue: 0 };
    byDay[day].revenue += l.total || 0;
  }
  const days = Object.entries(byDay).sort((a,b) => a[1].ts - b[1].ts);
  const maxDay = Math.max(...days.map(d => d[1].revenue), 1);

  const lowStock = items.filter(i => stockStatus(i) === 'low');
  const zeroStock = items.filter(i => stockStatus(i) === 'zero');

  const hasCost = items.some(i => i.cost > 0);

  document.getElementById('report-content').innerHTML = `
    <div class="stats-row" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">Выручка</div><div class="stat-value" style="font-size:18px;color:var(--success)">${formatPrice(revenue)}</div></div>
      ${hasCost ? `<div class="stat-card"><div class="stat-label">Прибыль</div><div class="stat-value" style="font-size:18px;color:var(--accent)">${formatPrice(profit)}</div></div>` : ''}
      <div class="stat-card"><div class="stat-label">Заказов</div><div class="stat-value">${orderCount}</div></div>
      <div class="stat-card"><div class="stat-label">Единиц продано</div><div class="stat-value">${units}</div></div>
      <div class="stat-card"><div class="stat-label">Средний чек</div><div class="stat-value" style="font-size:16px">${formatPrice(avgOrder)}</div></div>
    </div>

    ${days.length > 1 ? `
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text-muted)">ПРОДАЖИ ПО ДНЯМ</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:80px">
        ${days.map(([day, d]) => {
          const h = Math.max(4, Math.round((d.revenue / maxDay) * 72));
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
            <div title="${formatPrice(d.revenue)}" style="width:100%;height:${h}px;background:var(--accent);border-radius:4px 4px 0 0;opacity:0.85"></div>
            <span style="font-size:9px;color:var(--text-muted);writing-mode:vertical-lr;transform:rotate(180deg);height:28px;overflow:hidden">${day}</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <div class="rep-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px 20px">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text-muted)">ТОП-5 ТОВАРОВ</div>
        ${top.length ? top.map((t,i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border)">
            <div>
              <span style="font-size:13px;color:var(--text-muted);margin-right:6px">${i+1}.</span>
              <span style="font-size:13px">${esc(t.name)}</span>
              <div style="font-size:11px;color:var(--text-muted)">${t.units} шт.</div>
            </div>
            <span style="font-weight:600;font-size:13px;color:var(--success)">${formatPrice(t.revenue)}</span>
          </div>`).join('') : '<p style="color:var(--text-muted);font-size:13px">Нет данных</p>'}
      </div>

      <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px 20px">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text-muted)">ПО КАТЕГОРИЯМ</div>
        ${cats.length ? cats.map(([cat, c]) => {
          const pct = Math.round(c.revenue / revenue * 100) || 0;
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span>${esc(cat)}</span>
              <span style="color:var(--text-muted)">${c.units} шт. · ${formatPrice(c.revenue)}</span>
            </div>
            <div style="height:6px;background:var(--bg);border-radius:3px">
              <div style="height:6px;background:var(--accent);border-radius:3px;width:${pct}%;opacity:0.8"></div>
            </div>
          </div>`;
        }).join('') : '<p style="color:var(--text-muted);font-size:13px">Нет данных</p>'}
      </div>
    </div>

    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px 20px">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text-muted)">СКЛАДСКИЕ СИГНАЛЫ</div>
      ${zeroStock.length ? `<div style="margin-bottom:8px"><span style="font-size:12px;font-weight:600;color:var(--danger)">🔴 Закончились (${zeroStock.length} поз.):</span>
        <span style="font-size:13px;color:var(--text-muted);margin-left:6px">${zeroStock.map(i=>esc(i.name)).join(', ')}</span></div>` : ''}
      ${lowStock.length ? `<div><span style="font-size:12px;font-weight:600;color:var(--warn)">🟡 Мало (${lowStock.length} поз.):</span>
        <span style="font-size:13px;color:var(--text-muted);margin-left:6px">${lowStock.map(i=>`${esc(i.name)} — ${availableQty(i)} шт.`).join(', ')}</span></div>` : ''}
      ${!zeroStock.length && !lowStock.length ? '<p style="color:var(--success);font-size:13px">Всё в порядке, остатки в норме</p>' : ''}
    </div>
  `;
}

function setSort(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  ['sku','name','category','price','qty'].forEach(f => {
    document.getElementById('sort-'+f).textContent = f === sortField ? (sortAsc ? '↑' : '↓') : '';
  });
  renderTable();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const stk = document.getElementById('stock-filter').value;
  return items.filter(it => {
    const matchQ = !q || [it.sku, it.name, it.category, it.size, it.desc].some(v => v && v.toLowerCase().includes(q));
    const matchCat = !cat || it.category === cat;
    const matchStk = !stk || stockStatus(it) === stk;
    return matchQ && matchCat && matchStk;
  }).sort((a, b) => {
    let va = a[sortField] ?? '', vb = b[sortField] ?? '';
    if (typeof va === 'number') return sortAsc ? va - vb : vb - va;
    return sortAsc ? String(va).localeCompare(String(vb), 'ru') : String(vb).localeCompare(String(va), 'ru');
  });
}

function reservedQty(itemId) {
  return reserves.filter(r => r.status === 'active' && r.lines.some(l => l.itemId === itemId))
    .reduce((s, r) => s + (r.lines.find(l => l.itemId === itemId)?.qty || 0), 0);
}

function availableQty(it) {
  return it.qty - reservedQty(it.id);
}

function stockStatus(it) {
  const avail = availableQty(it);
  if (avail <= 0) return 'zero';
  if (avail <= (it.minQty || 3)) return 'low';
  return 'ok';
}

function formatPrice(n) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('ru-RU', { maximumFractionDigits: 0 }) + ' с';
}

function renderStats() {
  const total = items.reduce((s, i) => s + (i.qty || 0), 0);
  const value = items.reduce((s, i) => s + (i.qty || 0) * (i.price || 0), 0);
  const low = items.filter(i => stockStatus(i) === 'low').length;
  const zero = items.filter(i => stockStatus(i) === 'zero').length;
  const totalSales = sales.reduce((s, sl) => s + (sl.total || 0), 0);
  const activeRes = reserves.filter(r => r.status === 'active').length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">Позиций</div><div class="stat-value">${items.length}</div></div>
    <div class="stat-card"><div class="stat-label">Единиц на складе</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Стоимость склада</div><div class="stat-value" style="font-size:16px">${formatPrice(value)}</div></div>
    <div class="stat-card"><div class="stat-label">Мало / нет</div><div class="stat-value">${low} / <span style="color:var(--danger)">${zero}</span></div></div>
    <div class="stat-card"><div class="stat-label">В брони</div><div class="stat-value" style="color:var(--warn)">${activeRes}</div></div>
    <div class="stat-card"><div class="stat-label">Продано (сумма)</div><div class="stat-value" style="font-size:16px">${formatPrice(totalSales)}</div></div>
  `;
  const badge = document.getElementById('reserve-badge');
  if (activeRes > 0) { badge.style.display = 'inline'; badge.textContent = activeRes; }
  else { badge.style.display = 'none'; }
}

function renderTable() {
  const rows = getFiltered();
  const tbody = document.getElementById('table-body');
  const catSet = [...new Set(items.map(i => i.category).filter(Boolean))].sort();
  const catFilter = document.getElementById('cat-filter');
  const curCat = catFilter.value;
  catFilter.innerHTML = '<option value="">Все категории</option>' + catSet.map(c => `<option value="${esc(c)}" ${c===curCat?'selected':''}>${esc(c)}</option>`).join('');

  document.getElementById('cat-list').innerHTML = catSet.map(c => `<option value="${esc(c)}">`).join('');

  const cardsEl = document.getElementById('item-cards');
  if (!rows.length) {
    tbody.innerHTML = '';
    if (cardsEl) cardsEl.innerHTML = '';
    document.getElementById('empty-state').style.display = '';
    document.getElementById('main-table').style.display = 'none';
  } else {
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('main-table').style.display = '';
    tbody.innerHTML = rows.map(it => {
      const st = stockStatus(it);
      const badgeMap = { ok: ['ok','В наличии'], low: ['low','Мало'], zero: ['zero','Нет'] };
      const [bc, bl] = badgeMap[st];
      const img = it.photo
        ? `<img src="${it.photo}" class="thumb" alt="" ondblclick="openLightbox('${it.photo}')" style="cursor:zoom-in">`
        : `<div class="no-img">нет<br>фото</div>`;
      return `<tr>
        <td>${img}</td>
        <td><code style="font-size:12px;background:var(--bg);padding:2px 6px;border-radius:4px">${esc(it.sku||'—')}</code></td>
        <td><div style="font-weight:500">${esc(it.name)}</div>${it.size?`<div style="font-size:11px;color:var(--text-muted)">${esc(it.size)}</div>`:''}</td>
        <td>${esc(it.category||'—')}</td>
        <td><strong>${formatPrice(it.price)}</strong>${it.cost?`<div style="font-size:11px;color:var(--text-muted)">с/с ${formatPrice(it.cost)}</div>`:''}</td>
        <td>
          <span style="font-size:16px;font-weight:600">${availableQty(it)}</span>
          <span class="badge ${bc}" style="margin-left:6px">${bl}</span>
          ${reservedQty(it.id)>0?`<div style="font-size:11px;color:var(--warn);margin-top:2px">📌 ${reservedQty(it.id)} в брони</div>`:''}
        </td>
        <td><div class="actions">
          <button class="btn sm primary" onclick="addToCart(${it.id})">В корзину</button>
          <button class="btn sm" onclick="openEdit(${it.id})">✏️</button>
          <button class="btn sm danger" onclick="deleteItem(${it.id})">✕</button>
        </div></td>
      </tr>`;
    }).join('');

    if (cardsEl) cardsEl.innerHTML = rows.map(it => {
      const st = stockStatus(it);
      const badgeMap = { ok: ['ok','В наличии'], low: ['low','Мало'], zero: ['zero','Нет'] };
      const [bc, bl] = badgeMap[st];
      const img = it.photo
        ? `<img src="${it.photo}" class="item-card-img" ondblclick="openLightbox('${it.photo}')">`
        : `<div class="item-card-no-img">нет фото</div>`;
      return `<div class="item-card">
        ${img}
        <div class="item-card-body">
          <div class="item-card-name">${esc(it.name)}</div>
          <div class="item-card-meta">${it.sku?`<code style="font-size:10px;background:var(--bg);padding:1px 4px;border-radius:3px">${esc(it.sku)}</code> · `:''} ${esc(it.category||'')} ${it.size?'· '+esc(it.size):''}</div>
          <div class="item-card-row">
            <strong style="font-size:15px">${formatPrice(it.price)}</strong>
            <div style="text-align:right">
              <span style="font-weight:600">${availableQty(it)} шт.</span>
              <span class="badge ${bc}" style="margin-left:4px">${bl}</span>
              ${reservedQty(it.id)>0?`<div style="font-size:11px;color:var(--warn)">📌 ${reservedQty(it.id)} в брони</div>`:''}
            </div>
          </div>
          <div class="item-card-actions">
            <button class="btn sm primary" onclick="addToCart(${it.id})">В корзину</button>
            <button class="btn sm" onclick="openEdit(${it.id})">✏️</button>
            <button class="btn sm danger" onclick="deleteItem(${it.id})">✕</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  renderStats();
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.style.display = 'flex';
}
function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

      <td class="num">${Number(l.price).toLocaleString('ru-RU')} ₽</td>
      <td class="num"><b>${Number(l.qty * l.price).toLocaleString('ru-RU')} ₽</b></td>
    </tr>`).join('');

  const w = window.open('', '_blank');

  <style>
    body { font-family: Arial, sans-serif; font-size: 13px; color: #111; padding: 32px; max-width: 600px; margin: 0 auto; }

    td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: top; }

    @media print { body { padding: 10px; } }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openAddModal() {
  editingId = null;
  photoDataUrl = null;
  document.getElementById('modal-title').textContent = 'Добавить товар';
  ['sku','name','category','size','price','cost','qty','min-qty','desc'].forEach(f => {
    const el = document.getElementById('f-'+f);
    if (el) el.value = '';
  });
  document.getElementById('f-min-qty').value = '3';
  document.getElementById('f-photo').value = '';
  document.getElementById('f-photo-preview').style.display = 'none';
  document.getElementById('modal-overlay').style.display = 'flex';
}

function openEdit(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  editingId = id;
  photoDataUrl = it.photo || null;
  document.getElementById('modal-title').textContent = 'Редактировать товар';
  document.getElementById('f-sku').value = it.sku || '';
  document.getElementById('f-name').value = it.name || '';
  document.getElementById('f-category').value = it.category || '';
  document.getElementById('f-size').value = it.size || '';
  document.getElementById('f-price').value = it.price || '';
  document.getElementById('f-cost').value = it.cost || '';
  document.getElementById('f-qty').value = it.qty || 0;
  document.getElementById('f-min-qty').value = it.minQty ?? 3;
  document.getElementById('f-desc').value = it.desc || '';
  document.getElementById('f-photo').value = '';
  const prev = document.getElementById('f-photo-preview');
  if (it.photo) { prev.src = it.photo; prev.style.display = ''; }
  else { prev.style.display = 'none'; }
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function previewPhoto(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    photoDataUrl = e.target.result;
    const prev = document.getElementById('f-photo-preview');
    prev.src = photoDataUrl;
    prev.style.display = '';
  };
  reader.readAsDataURL(input.files[0]);
}

async function saveItem() {
  const sku = document.getElementById('f-sku').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value) || 0;
  const qty = parseInt(document.getElementById('f-qty').value) || 0;
  if (!name) { alert('Введите название'); return; }

  const obj = {
    sku,
    name,
    category: document.getElementById('f-category').value.trim(),
    size: document.getElementById('f-size').value.trim(),
    price,
    cost: parseFloat(document.getElementById('f-cost').value) || 0,
    qty,
    minQty: parseInt(document.getElementById('f-min-qty').value) || 3,
    desc: document.getElementById('f-desc').value.trim(),
    photo: photoDataUrl || null,
    updatedAt: Date.now(),
  };

  if (!db) { alert('База данных не готова. Обновите страницу.'); return; }
  try {
    if (editingId) {
      obj.id = editingId;
      await txPut('items', obj);
    } else {
      obj.createdAt = Date.now();
      await txAdd('items', obj);
    }
    await loadAll();
    renderTable();
    closeModal();
  } catch (err) {
    alert('Ошибка сохранения: ' + (err && err.message ? err.message : err));
    console.error(err);
  }
}

async function deleteItem(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  if (!confirm(`Удалить "${it.name}"?`)) return;
  await txDelete('items', id);
  await loadAll();
  renderTable();
}

function addToCart(id) {
  const it = items.find(i => i.id === id);
  const avail = availableQty(it);
  if (!it || avail <= 0) { alert('Товара нет в наличии (с учётом броней)'); return; }
  const existing = cart.find(c => c.itemId === id);
  const inCart = existing ? existing.qty : 0;
  if (inCart >= avail) { alert(`Доступно только ${avail} шт. (остальное в брони)`); return; }
  if (existing) existing.qty++;
  else cart.push({ itemId: id, qty: 1, price: it.price || 0 });
  renderCart();
}

function renderCart() {
  const panel = document.getElementById('cart-panel');
  if (!cart.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'flex';

  document.getElementById('cart-items').innerHTML = cart.map((c, idx) => {
    const it = items.find(i => i.id === c.itemId);
    if (!it) return '';
    const img = it.photo
      ? `<img src="${it.photo}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;flex-shrink:0">`
      : `<div style="width:36px;height:36px;border-radius:6px;background:var(--bg);border:0.5px dashed var(--border-strong);flex-shrink:0"></div>`;
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:0.5px solid var(--border)">
      ${img}
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.name)}</div>
        <div style="font-size:11px;color:var(--text-muted)">макс. ${it.qty} шт.</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
        <button onclick="cartQty(${idx},-1)" style="width:24px;height:24px;border:0.5px solid var(--border-strong);background:var(--bg);border-radius:4px;cursor:pointer;font-size:14px">−</button>
        <span style="width:24px;text-align:center;font-size:13px;font-weight:600">${c.qty}</span>
        <button onclick="cartQty(${idx},1)" style="width:24px;height:24px;border:0.5px solid var(--border-strong);background:var(--bg);border-radius:4px;cursor:pointer;font-size:14px">+</button>
      </div>
      <div style="width:70px;flex-shrink:0">
        <input type="number" value="${c.price}" min="0" step="1"
          style="width:100%;padding:3px 5px;font-size:12px;border:0.5px solid var(--border-strong);border-radius:5px;background:var(--surface);color:var(--text)"
          onchange="cartPrice(${idx},this.value)" placeholder="₽">
      </div>
      <button onclick="cartRemove(${idx})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;padding:0 2px">✕</button>
    </div>`;
  }).join('');

  const total = cart.reduce((s, c) => s + c.qty * c.price, 0);
  document.getElementById('cart-total').textContent = formatPrice(total);
}

function cartQty(idx, delta) {
  const c = cart[idx];
  const it = items.find(i => i.id === c.itemId);
  const newQty = c.qty + delta;
  if (newQty < 1) { cartRemove(idx); return; }
  if (newQty > availableQty(it)) { alert(`Доступно только ${availableQty(it)} шт.`); return; }
  c.qty = newQty;
  renderCart();
}

function cartPrice(idx, val) {
  cart[idx].price = parseFloat(val) || 0;
  const total = cart.reduce((s, c) => s + c.qty * c.price, 0);
  document.getElementById('cart-total').textContent = formatPrice(total);
}

function cartRemove(idx) {
  cart.splice(idx, 1);
  renderCart();
}

function clearCart() {
  cart = [];
  renderCart();
}

async function confirmOrder() {
  if (!cart.length) return;
  if (!db) { alert('База данных не готова. Обновите страницу.'); return; }

  for (const c of cart) {
    const it = items.find(i => i.id === c.itemId);
    if (!it) continue;
    if (c.qty > it.qty) { alert(`"${it.name}": на складе только ${it.qty} шт., а в корзине ${c.qty}.`); return; }
  }

  const note = document.getElementById('cart-note').value.trim();
  const orderId = Date.now();

  try {
    for (const c of cart) {
      const it = items.find(i => i.id === c.itemId);
      it.qty -= c.qty;
      it.updatedAt = Date.now();
      await txPut('items', it);
      await txAdd('sales', {
        orderId,
        itemId: it.id,
        itemName: it.name,
        itemSku: it.sku,
        qty: c.qty,
        price: c.price,
        total: c.qty * c.price,
        note,
        soldAt: orderId,
      });
    }
    cart = [];
    await loadAll();
    renderTable();
    renderCart();
    document.getElementById('cart-note').value = '';
  } catch (err) {
    alert('Ошибка: ' + (err && err.message ? err.message : err));
  }
}

async function createReserve() {
  if (!cart.length) return;
  if (!db) { alert('База данных не готова. Обновите страницу.'); return; }
  const client = document.getElementById('cart-note').value.trim();
  if (!client) { alert('Укажите имя клиента для брони'); document.getElementById('cart-note').focus(); return; }

  for (const c of cart) {
    const it = items.find(i => i.id === c.itemId);
    if (!it) continue;
    if (c.qty > availableQty(it)) {
      alert(`"${it.name}": доступно только ${availableQty(it)} шт.`);
      return;
    }
  }

  try {
    await txAdd('reserves', {
      client,
      lines: cart.map(c => ({ itemId: c.itemId, qty: c.qty, price: c.price })),
      status: 'active',
      createdAt: Date.now(),
    });
    cart = [];
    document.getElementById('cart-note').value = '';
    await loadAll();
    renderTable();
    renderCart();
    renderStats();
    showTab('reserves');
  } catch(err) {
    alert('Ошибка: ' + (err && err.message ? err.message : err));
  }
}

function renderReserves() {
  const q = (document.getElementById('res-search')?.value || '').toLowerCase();
  const active = reserves.filter(r => r.status === 'active' && (
    !q || r.client.toLowerCase().includes(q) ||
    r.lines.some(l => { const it = items.find(i => i.id === l.itemId); return it && (it.name.toLowerCase().includes(q) || (it.sku||'').toLowerCase().includes(q)); })
  )).sort((a, b) => b.createdAt - a.createdAt);

  const el = document.getElementById('reserves-list');
  const emp = document.getElementById('res-empty');
  if (!active.length) { el.innerHTML = ''; emp.style.display = ''; return; }
  emp.style.display = 'none';

  el.innerHTML = active.map(r => {
    const d = new Date(r.createdAt);
    const dateStr = d.toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
    const timeStr = d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
    const total = r.lines.reduce((s, l) => s + l.qty * l.price, 0);
    const linesHtml = r.lines.map(l => {
      const it = items.find(i => i.id === l.itemId);
      if (!it) return '';
      const img = it.photo
        ? `<img src="${it.photo}" style="width:32px;height:32px;object-fit:cover;border-radius:5px;flex-shrink:0">`
        : `<div style="width:32px;height:32px;border-radius:5px;background:var(--bg);border:0.5px dashed var(--border-strong);flex-shrink:0"></div>`;
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0">
        ${img}
        <div style="flex:1">
          <span style="font-size:13px">${esc(it.name)}</span>
          ${it.size ? `<span style="font-size:11px;color:var(--text-muted)"> · ${esc(it.size)}</span>` : ''}
        </div>
        <span style="font-size:13px;color:var(--text-muted)">${l.qty} шт.</span>
        <span style="font-size:13px;font-weight:500">${formatPrice(l.price)}</span>
      </div>`;
    }).join('');

    return `<div class="history-item" style="flex-direction:column;align-items:stretch;gap:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:15px">📌 ${esc(r.client)}</div>
          <div class="history-meta">${dateStr}, ${timeStr}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:600;font-size:15px">${formatPrice(total)}</div>
          <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
            <button class="btn sm primary" onclick="confirmReserve(${r.id})">✅ Продать</button>
            <button class="btn sm" onclick="editReserve(${r.id})">✏️ Изменить</button>
            <button class="btn sm" onclick='printReceipt(${JSON.stringify(r.lines.map(l=>{const it=items.find(i=>i.id===l.itemId);return{itemName:it?it.name:"?",itemSku:it?it.sku:"",qty:l.qty,price:l.price};}))}, ${JSON.stringify(r.client)}, ${r.createdAt}, "Бронь")'>🖨️ Чек</button>
            <button class="btn sm danger" onclick="cancelReserve(${r.id})">✕ Отменить</button>
          </div>
        </div>
      </div>
      <div style="border-top:0.5px solid var(--border);padding-top:6px">${linesHtml}</div>
    </div>`;
  }).join('');
}

async function confirmReserve(id) {
  const r = reserves.find(x => x.id === id);
  if (!r) return;
  if (!confirm(`Подтвердить продажу брони клиента "${r.client}"?`)) return;

  const orderId = Date.now();
  try {
    for (const l of r.lines) {
      const it = items.find(i => i.id === l.itemId);
      if (!it) continue;
      it.qty -= l.qty;
      it.updatedAt = Date.now();
      await txPut('items', it);
      await txAdd('sales', {
        orderId,
        itemId: it.id,
        itemName: it.name,
        itemSku: it.sku,
        qty: l.qty,
        price: l.price,
        total: l.qty * l.price,
        note: `Бронь: ${r.client}`,
        soldAt: orderId,
      });
    }
    r.status = 'confirmed';
    r.confirmedAt = Date.now();
    await txPut('reserves', r);
    await loadAll();
    renderReserves();
    renderStats();
  } catch(err) {
    alert('Ошибка: ' + (err && err.message ? err.message : err));
  }
}

async function editReserve(id) {
  const r = reserves.find(x => x.id === id);
  if (!r) return;
  r.status = 'cancelled';
  r.cancelledAt = Date.now();
  await txPut('reserves', r);
  await loadAll();

  cart = r.lines.map(l => ({ itemId: l.itemId, qty: l.qty, price: l.price }));
  document.getElementById('cart-note').value = r.client;
  showTab('inventory');
  renderTable();
  renderCart();
}

async function cancelReserve(id) {
  const r = reserves.find(x => x.id === id);
  if (!r) return;
  if (!confirm(`Отменить бронь клиента "${r.client}"?`)) return;
  r.status = 'cancelled';
  r.cancelledAt = Date.now();
  await txPut('reserves', r);
  await loadAll();
  renderReserves();
  renderTable();
  renderStats();
}

function renderHistory() {
  const q = (document.getElementById('hist-search')?.value || '').toLowerCase();

  const orderMap = new Map();
  for (const s of sales) {
    const key = s.orderId || s.id;
    if (!orderMap.has(key)) orderMap.set(key, { soldAt: s.soldAt, note: s.note, lines: [] });
    orderMap.get(key).lines.push(s);
  }

  let orders = [...orderMap.entries()].map(([id, o]) => ({ id, ...o }))
    .filter(o => !q || o.lines.some(l => [l.itemName, l.itemSku, o.note].some(v => v && v.toLowerCase().includes(q))))
    .sort((a, b) => b.soldAt - a.soldAt);

  const el = document.getElementById('history-list');
  const emp = document.getElementById('hist-empty');
  if (!orders.length) { el.innerHTML = ''; emp.style.display = ''; return; }
  emp.style.display = 'none';

  el.innerHTML = orders.map(o => {
    const d = new Date(o.soldAt);
    const dateStr = d.toLocaleDateString('ru-RU', { day:'numeric', month:'short', year:'numeric' });
    const timeStr = d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
    const orderTotal = o.lines.reduce((s, l) => s + (l.total || 0), 0);
    const linesHtml = o.lines.map(l =>
      `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);padding:2px 0">
        <span>${esc(l.itemName)}${l.itemSku ? ` <code style="font-size:11px">${esc(l.itemSku)}</code>` : ''} — ${l.qty} шт.</span>
        <span>${formatPrice(l.price)} / шт.</span>
      </div>`
    ).join('');
    return `<div class="history-item" style="flex-direction:column;align-items:stretch;gap:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;font-size:14px">${o.lines.length > 1 ? `Заказ (${o.lines.length} позиции)` : esc(o.lines[0].itemName)}</div>
          ${o.note ? `<div class="history-meta">${esc(o.note)}</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-weight:600;color:var(--success)">${formatPrice(orderTotal)}</div>
          <div class="history-meta">${dateStr}, ${timeStr}</div>
          <button class="btn sm" style="margin-top:6px" onclick='printReceipt(${JSON.stringify(o.lines.map(l=>({itemName:l.itemName,itemSku:l.itemSku,qty:l.qty,price:l.price})))}, ${JSON.stringify(o.lines[0].note||"")}, ${o.soldAt}, "Чек о продаже")'>🖨️ Чек</button>
        </div>
      </div>
      ${o.lines.length > 1 ? `<div style="border-top:0.5px solid var(--border);padding-top:6px">${linesHtml}</div>` : ''}
    </div>`;
  }).join('');
}

async function clearHistory() {
  if (!confirm('Очистить всю историю продаж?')) return;
  await txClear('sales');
  await loadAll();
  renderHistory();
  renderStats();
}

  { sku: 'HL-001', name: 'Халат махровый', category: 'Халаты', size: 'Universal', price: 2100, cost: 1100, qty: 5, minQty: 2 },
  { sku: 'HL-002', name: 'Халат кимоно шёлк', category: 'Халаты', size: 'S/M', price: 2800, cost: 1400, qty: 4, minQty: 2 },
  { sku: 'FT-001', name: 'Тапочки закрытые', category: 'Тапочки', size: '36-38', price: 590, cost: 280, qty: 20, minQty: 5 },
  { sku: 'FT-002', name: 'Тапочки открытые помпон', category: 'Тапочки', size: '39-41', price: 490, cost: 230, qty: 2, minQty: 5 },
];

async function seedIfEmpty() {
  if (items.length > 0) return;
  document.getElementById('seed-btn').style.display = '';
  for (const s of SAMPLES) {
    await txAdd('items', { ...s, photo: null, desc: '', createdAt: Date.now(), updatedAt: Date.now() });
  }
  await loadAll();
}

async function seedManual() {
  if (!db) { alert('База данных не готова. Обновите страницу.'); return; }
  try {
    for (const s of SAMPLES) {
      await txAdd('items', { ...s, photo: null, desc: '', createdAt: Date.now(), updatedAt: Date.now() });
    }
    await loadAll();
    renderTable();
    document.getElementById('seed-btn').style.display = 'none';
  } catch(err) {
    alert('Ошибка загрузки примеров: ' + (err && err.message ? err.message : err));
  }
}

openDB().then(loadAll).then(seedIfEmpty).then(renderTable).catch(err => {
  document.querySelector('main').innerHTML = `<div class="empty"><p style="color:var(--danger);font-size:15px">Не удалось открыть базу данных.<br><br>${err && err.message ? err.message : err}</p><p style="margin-top:12px;font-size:13px;color:var(--text-muted)">Попробуйте открыть файл через браузер Chrome или Firefox. В Safari может потребоваться включить доступ к локальным файлам.</p></div>`;
});
